<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f5f7fa;
    }

    .sidebar {
      min-height: 100vh;
      background: #343a40;
    }

    .sidebar .list-group-item {
      background: transparent;
      color: #ccc;
      border: none;
    }

    .sidebar .list-group-item:hover,
    .sidebar .list-group-item.active {
      background: #495057;
      color: #fff;
    }

    .card {
      border-radius: 12px;
    }
  </style>
</head>

<body>

  <div class="container-fluid">
    <div class="row">

      <!-- Sidebar -->
      <div class="col-md-3 col-lg-2 p-0 sidebar">
        <h4 class="text-white text-center py-3">Dashboard</h4>

        <div class="list-group list-group-flush">
          <a href="#" class="list-group-item active">🏠 Home</a>
          <a href="#" class="list-group-item">📦 Products</a>
          <a href="#" class="list-group-item">📑 Orders</a>
          <a href="#" class="list-group-item">👥 Customers</a>
          <a href="#" class="list-group-item">📊 Reports</a>
          <a href="#" class="list-group-item">⚙️ Settings</a>
        </div>
      </div>

      <!-- Main Content -->
      <div class="col-md-9 col-lg-10 p-4">

        <h2 class="mb-4">Dashboard Overview</h2>

        <!-- Cards -->
        <div class="row g-4">

          <div class="col-md-4">
            <div class="card shadow-sm p-3 text-center">
              <h5>Total Sales</h5>
              <h3 class="text-success">$12,500</h3>
            </div>
          </div>

          <div class="col-md-4">
            <div class="card shadow-sm p-3 text-center">
              <h5>Orders</h5>
              <h3 class="text-primary">320</h3>
            </div>
          </div>

          <div class="col-md-4">
            <div class="card shadow-sm p-3 text-center">
              <h5>Customers</h5>
              <h3 class="text-warning">150</h3>
            </div>
          </div>

        </div>

        <!-- Recent Activity -->
        <div class="mt-5">
          <h4>Recent Activity</h4>

          <ul class="list-group">
            <li class="list-group-item">New order placed</li>
            <li class="list-group-item">User registered</li>
            <li class="list-group-item">Payment received</li>
            <li class="list-group-item">Product added</li>
          </ul>
        </div>

      </div>

    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
